[toolchain]
anchor_version = "0.32.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
contest = "BUzLPyNSfEGnKY3RozDtny4us72bYPbiCq2njQLjtaff"

[programs.devnet]
contest = "BUzLPyNSfEGnKY3RozDtny4us72bYPbiCq2njQLjtaff"

[programs.mainnet]
contest = "BUzLPyNSfEGnKY3RozDtny4us72bYPbiCq2njQLjtaff"

[registry]
url = "https://api.apr.dev"

# Default provider for local development
[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

# Devnet provider - used with: anchor deploy --provider.cluster devnet --provider.wallet ./deployer.json
# Mainnet provider - used with: anchor deploy --provider.cluster mainnet --provider.wallet ./deployer.json

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/**/*test*.ts'"
